name: Deploy para Hostinger

on:
  push:
    branches:
      - main # O robô é ativado sempre que houver alteração na branch main

jobs:
  web-deploy:
    name: Build e Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Pegando o código mais recente
        uses: actions/checkout@v3
      
      - name: Instalando o Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20' # Versão do Node
          
      - name: Instalando dependências (npm install)
        working-directory: ./app
        run: npm install
        
      - name: Compilando o projeto (npm run build)
        working-directory: ./app
        run: npm run build
        
      - name: Instalando pacote FTP
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Listar arquivos compilados (Debug)
        run: ls -R ./app/dist/

      - name: 🔍 Localizar pastas public_html (Busca Profunda)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "set net:timeout 10; set net:max-retries 1; set ftp:ssl-allow no; open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" \"$FTP_SERVER\"; echo '--- BUSCANDO TODAS AS PASTAS public_html NO SERVIDOR ---'; find . -name \"public_html\" -type d; echo '--- BUSCANDO ONDE ESTÁ O index.html ANTIGO ---'; find . -name \"index.html\";"

      - name: 🚀 Deploy via FTP (Modo Robusto)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./app/dist/
          server-dir: ./
          protocol: ftp
          port: 21
