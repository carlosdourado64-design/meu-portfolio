name: Deploy para Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build e Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Pegando o código mais recente
        uses: actions/checkout@v3
      
      - name: Instalando o Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Instalando dependências (npm install)
        working-directory: ./app
        run: npm install
        
      - name: Compilando o projeto (npm run build)
        working-directory: ./app
        run: npm run build

      - name: 🚀 Configurando Conexão Segura
        run: |
          # Remove prefixos ftp:// se existirem para evitar erro de hostname
          CLEAN_SERVER=$(echo "${{ secrets.FTP_SERVER }}" | sed -e 's|^ftp://||' -e 's|^ftps://||')
          echo "SERVER=$CLEAN_SERVER" >> $GITHUB_ENV

      - name: 🚀 Enviando para douradostudio.com (Caminho Absoluto)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ env.SERVER }}
          port: 65002
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: './app/dist/'
          remote_path: '/home/u618563005/domains/douradostudio.com/public_html/'
          sftp_only: true
          delete_remote_files: true
