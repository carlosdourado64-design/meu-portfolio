name: Deploy para Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build e Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Pegando o código mais recente
        uses: actions/checkout@v3
      
      - name: Instalando o Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Instalando dependências (npm install)
        working-directory: ./app
        run: npm install
        
      - name: Compilando o projeto (npm run build)
        working-directory: ./app
        run: npm run build
        
      - name: Instalando pacote FTP
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: 🔍 Varredura de Pastas e Deploy
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set net:timeout 30;
            set ftp:ssl-allow no;
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" \"$FTP_SERVER\";
            echo '--- LISTANDO TUDO QUE O FTP ENXERGA ---';
            ls -R;
            echo '--- TENTANDO ACESSAR O CAMINHO DO SITE ---';
            cd domains/douradostudio.com/public_html/ || cd douradostudio.com/public_html/ || echo 'Caminho nao encontrado, ficando na raiz';
            mirror -R --delete ./app/dist/ ./;
            echo 'Deploy Finalizado!';
          "
