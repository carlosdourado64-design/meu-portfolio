name: Deploy para Hostinger

on:
  push:
    branches:
      - main # O robô é ativado sempre que houver alteração na branch main

jobs:
  web-deploy:
    name: Build e Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Pegando o código mais recente
        uses: actions/checkout@v3
      
      - name: Instalando o Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20' # Versão do Node
          
      - name: Instalando dependências (npm install)
        working-directory: ./app
        run: npm install
        
      - name: Compilando o projeto (npm run build)
        working-directory: ./app
        run: npm run build
        
      - name: Instalando pacote FTP
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: 🚀 Deploy Final via FTP (Lftp)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "set net:timeout 30; set net:max-retries 3; set ftp:ssl-allow no; open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" \"$FTP_SERVER\"; echo '--- ONDE ESTAMOS ---'; pwd; ls -la; echo 'Tentando caminhos...'; cd public_html || cd domains/douradostudio.com/public_html || echo 'Ficando na raiz'; mirror -R --delete ./app/dist/ ./; echo 'Deploy concluido!';"
